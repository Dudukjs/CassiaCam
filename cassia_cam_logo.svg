<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <!-- Camera body -->
  <path d="M 120 50 L 160 50 C 170 50 175 55 175 65 L 175 165 C 175 175 170 180 160 180 L 50 180 C 40 180 35 175 35 165 L 35 65 C 35 55 40 50 50 50 L 85 50 L 95 35 L 120 35 Z" fill="none" stroke="#FF3B6D" stroke-width="8" stroke-linejoin="round"/>

  <!-- Lens circles -->
  <circle cx="100" cy="110" r="35" fill="none" stroke="#FF3B6D" stroke-width="6"/>
  <circle cx="100" cy="110" r="22" fill="none" stroke="#FF3B6D" stroke-width="6"/>
  <circle cx="100" cy="110" r="10" fill="#FF3B6D"/>
  <circle cx="100" cy="110" r="5" fill="#fff"/>

  <!-- Lens division line -->
  <line x1="50" y1="110" x2="70" y2="110" stroke="#FF3B6D" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="110" x2="150" y2="110" stroke="#FF3B6D" stroke-width="6" stroke-linecap="round"/>

  <!-- Top detail -->
  <rect x="80" y="20" width="40" height="20" rx="3" fill="none" stroke="#FF3B6D" stroke-width="6"/>
  <rect x="75" y="32" width="8" height="12" rx="2" fill="#FF3B6D"/>

  <!-- Heart in corner -->
  <path d="M 155 65 C 155 62 157 60 160 60 C 162 60 164 62 164 65 C 164 62 166 60 169 60 C 172 60 174 62 174 65 C 174 68 172 72 160 78 C 148 72 146 68 146 65 C 146 62 148 60 151 60 C 153 60 155 62 155 65 Z" fill="#FF3B6D" transform="translate(-35, 45) scale(0.6)"/>

  <!-- Text: Cassia -->
  <text x="100" y="220" font-family="cursive" font-size="48" font-weight="bold" text-anchor="middle" fill="#FF3B6D">Cassia</text>

  <!-- Small heart near text -->
  <circle cx="130" cy="215" r="3" fill="#FF3B6D"/>

  <!-- Text: CAM -->
  <text x="100" y="260" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle" letter-spacing="8" fill="#FF3B6D">—   CAM   —</text>

  <!-- Sparkle top-left -->
  <g transform="translate(60, 35)">
    <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z" fill="#FF3B6D"/>
  </g>
</svg>
